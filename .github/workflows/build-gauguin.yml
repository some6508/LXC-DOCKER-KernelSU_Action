name: 为Gauguin编译SukiSUUltra内核

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'Kernel branch/tag'
        required: true
jobs:
  build:
    runs-on: ubuntu-22.04
    name: 构建Gauguin内核
    steps:
      - name: 克隆内核源码
        run: |
         git clone https://github.com/LineageOS/android_kernel_xiaomi_gauguin.git -b lineage-23.2 kernel

      - name: 下载工具链
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git automake flex lzop bison gperf \
            build-essential zip curl zlib1g-dev \
            g++-multilib libxml2-utils bzip2 libbz2-dev \
            libbz2-1.0 libghc-bzlib-dev squashfs-tools \
            schedtool dpkg-dev liblz4-tool make \
            maven libssl-dev libswitch-perl \
            policycoreutils libxml-sax-base-perl \
            libxml-simple-perl bc libc6-dev-i386 \
            lib32ncurses5-dev x11proto-core-dev \
            libx11-dev lib32z-dev libgl1-mesa-dev \
            xsltproc unzip device-tree-compiler \
            python3 python3-pip libncurses5-dev \
            ccache cpio rsync wget

      - name: 下载 Clang & GCC
        run: |
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/android16-qpr2-release/clang-r563880c.tar.gz
          mkdir ~/clang
          tar -xzf clang-r563880c.tar.gz -C ~/clang
          export PATH="~/clang/bin:$PATH"
          chmod +x ~/clang/bin/*

          wget https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/x86/x86_64-linux-android-4.9/+archive/refs/heads/android12-release.tar.gz
          mkdir ~/gcc
          tar -xzf android12-release.tar.gz -C ~/gcc
          export PATH="~/gcc/bin:$PATH"
          chmod +x ~/gcc/bin/*

      - name: 开启lxc和docker配置
        run: |
          cd ~/kernel
          wget https://github.com/ego-taboo/LXC-DOCKER-KernelSU_Action/releases/download/2.0.0/add-lxc-docker-custom3.sh
          chmod 755 add-lxc-docker-custom3.sh
          ./add-lxc-docker-custom3.sh ~/kernel/arch/arm64/configs/vendor/kona-perf_defconfig
          echo "# CONFIG_ANDROID_PARANOID_NETWORK is not set" >> ~/kernel/arch/arm64/configs/vendor/kona-perf_defconfig

      - name: 添加runc补丁
        run: |
          cd ~/kernel
          wget https://github.com/ego-taboo/LXC-DOCKER-KernelSU_Action/releases/download/1.0.0/runcpatch.sh
          chmod a+x runcpatch.sh
          if [ -f ~/kernel/kernel/cgroup.c ]; then
            ./runcpatch.sh ~/kernel/kernel/cgroup.c
          fi
          if [ -f ~/kernel/kernel/cgroup/cgroup.c ]; then
            ./runcpatch.sh ~/kernel/kernel/cgroup/cgroup.c
          fi

      - name: 增加SukiSUUltra支持
        run: |
          git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra
          cd ~/kernel
          sh ~/SukiSU-Ultra/kernel/setup.sh ~/kernel

      - name: 构建内核
        run: |
          cd ~/kernel
          export ARCH=arm64
          export SUBARCH=arm64

          mkdir -p out
          
          make O=out \
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            -j$(nproc --all) \
            2>&1 | tee build.log
          
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Failed 构建失败"
            echo "日志:"
            tail -50 build.log
            exit 1
          fi
          
          echo "Success 构建成功"
          ls -la out/arch/arm64/boot/

      - name: 获取编译结果
        run: |
          mkdir -p artifacts
          
          cd ${{ github.workspace }}/kernel
          
          # Copy all possible kernel images
          for img in Image Image.gz Image.gz-dtb; do
            if [ -f out/arch/arm64/boot/$img ]; then
              cp out/arch/arm64/boot/$img artifacts/
              echo "Found $img"
            fi
          done
          
          # Copy DTB files
          if [ -d out/arch/arm64/boot/dts ]; then
            find out/arch/arm64/boot/dts -name "*.dtb" -exec cp {} artifacts/ \;
          fi
          
          # Copy DTBO if exists
          [ -f out/arch/arm64/boot/dtbo.img ] && cp out/arch/arm64/boot/dtbo.img artifacts/
          
          # Copy modules if any
          find out -name "*.ko" -exec cp {} artifacts/ \; 2>/dev/null || true
          
          echo "Artifacts:"
          ls -la artifacts/

      - name: 创建AnyKernel3刷机包
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          
          cd AnyKernel3
          
          # Copy kernel image
          cp ../artifacts/Image* . 2>/dev/null || true
          
          # Copy dtb files
          cp ../artifacts/*.dtb . 2>/dev/null || true
          
          # Copy dtbo
          cp ../artifacts/dtbo.img . 2>/dev/null || true
          
          # Remove git files and create zip
          rm -rf .git
          ZIP_NAME="SukiSUItra-Kernel-gauguin-$(date +%Y%m%d-%H%M).zip"
          zip -r9 ../$ZIP_NAME * -x README.md LICENSE
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "Created $ZIP_NAME"

      - name: 上传编译结果
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: SukiSUItra-Kernel-Flashable
          path: SukiSUItra-Kernel-*.zip

      - name: 上传编译日志
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: ${{ github.workspace }}/kernel/build.log

      - name: 构建结果
        if: always()
        run: |
          echo "========================================="
          echo "        构建结果                    "
          echo "========================================="
          echo "Clang: ${{ env.CLANG_VERSION }}"
          echo "状态: ${{ job.status }}"
          echo "========================================="
          
          if [ -f ${{ github.workspace }}/kernel/build.log ]; then
            echo "日志:"
            tail -30 ${{ github.workspace }}/kernel/build.log
          fi
          
          if [ -f SukiSUItra-Kernel-*.zip ]; then
            echo ""
            echo "📦 刷机文件: ${{ env.ZIP_NAME }}"
            ls -lh SukiSUItra-Kernel-*.zip
          fi
